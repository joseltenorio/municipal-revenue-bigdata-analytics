quality:
  valid_statuses:
  - PASS
  - WARNING
  - FAIL
  output:
    results_jsonl: data/quality/bronze_quality_results.jsonl
    report_html: reports/data_quality_report.html
  bronze:
    common_metadata_columns:
    - bronze_source_name
    - bronze_resource_key
    - bronze_source_file_name
    - bronze_source_file_path
    - bronze_processed_at_utc
    optional_metadata_columns:
    - bronze_source_year
    - bronze_source_role
    - bronze_source_priority
    rules:
      dataset_path_exists:
        severity: FAIL
        description: Validar que exista la ruta esperada del recurso Bronze.
      parquet_files_exist:
        severity: FAIL
        description: Validar que existan archivos Parquet bajo la ruta del recurso.
      dataset_readable:
        severity: FAIL
        description: Validar que Spark pueda leer el dataset Parquet.
      row_count_positive:
        severity: FAIL
        description: Validar que el dataset tenga al menos una fila.
      column_count_positive:
        severity: FAIL
        description: Validar que el dataset tenga al menos una columna.
      bronze_metadata_columns_present:
        severity: FAIL
        description: Validar columnas comunes de metadata técnica Bronze.
      fully_null_columns:
        severity: WARNING
        description: Detectar columnas completamente nulas.
      exact_duplicate_rows:
        severity: WARNING
        description: Detectar filas duplicadas exactas dentro del recurso.
      invalid_year:
        severity: WARNING
        description: Validar años fuera del rango esperado cuando exista columna de año.
        candidate_columns:
        - anio
        - ano
        - año
        - bronze_source_year
        min_year: 2010
        max_year: 2030
      invalid_ubigeo:
        severity: WARNING
        description: Validar ubigeos vacíos o con formato distinto de seis dígitos cuando exista columna
          ubigeo.
        candidate_columns:
        - ubigeo
        pattern: ^[0-9]{6}$
      expected_columns_present:
        severity: FAIL
        description: Validar columnas esperadas para recursos Bronze con contrato definido.
      valid_tipo_clasificacion:
        severity: FAIL
        description: Validar que tipo_clasificacion solo contenga A-G cuando aplique.
      expected_total_rows:
        severity: FAIL
        description: Validar conteo total esperado para fuentes Bronze con referencia oficial.
      expected_rows_by_tipo:
        severity: FAIL
        description: Validar conteos esperados por tipo_clasificacion cuando aplique.
      duplicate_key_check_anio_ubigeo:
        severity: FAIL
        description: Validar ausencia de duplicados por anio y ubigeo.
      invalid_percentage:
        severity: WARNING
        description: Validar columnas que sugieren porcentajes o tasas cuando existan en Bronze.
        column_name_patterns:
        - porcentaje
        - percent
        - pct
        - avance
        - cumplimiento
        - rate
        min_value: 0
        max_value: 100
    sources:
      siaf_income:
        expected_resources:
        - annual_2012
        - annual_2013
        - annual_2014
        - annual_2015
        - annual_2016
        - annual_2017
        - annual_2018
        - annual_2019
        - annual_2020
        - annual_2021
        - annual_2022
        - annual_2023
        - annual_2024
        - monthly_2025
        - daily_2025
        - monthly_2026
        - daily_2026
        optional_metadata_columns:
        - bronze_source_year
      sismepre:
        expected_resources:
        - preguntas
        - estadistica
        - formulario
        - esat_estadistica_atm
        - respuestas
        - ano_aplicacion
        - entidad_estado
        optional_metadata_columns:
        - bronze_source_role
        - bronze_source_priority
      renamu:
        expected_resources:
        - base_renamu_2022
        optional_metadata_columns:
        - bronze_source_year
      municipal_classification:
        dataset_layout: direct
        expected_resources:
        - municipal_classification
        optional_metadata_columns: []
        expected_columns:
        - anio
        - tipo_clasificacion
        - ambito_municipal
        - descripcion_tipo
        - nro
        - ubigeo
        - departamento_nombre
        - provincia_nombre
        - distrito_nombre
        - bronze_source_name
        - bronze_resource_key
        - bronze_source_file_name
        - bronze_source_file_path
        - bronze_source_url
        - bronze_source_page_url
        - bronze_processed_at_utc
        expected_total_rows: 1874
        expected_rows_by_tipo:
          A: 74
          B: 122
          C: 42
          D: 129
          E: 378
          F: 509
          G: 620
        valid_tipo_clasificacion:
        - A
        - B
        - C
        - D
        - E
        - F
        - G
  silver:
    output:
      results_jsonl: data/quality/silver_quality_results.jsonl
      report_html: reports/silver_quality_report.html
    common_metadata_columns:
    - silver_source_name
    - silver_resource_key
    - silver_processed_at_utc
    dictionary_references:
      siaf_income:
        required: false
        paths:
        - data/landing/siaf_income/Ingresos_Diccionario.csv
      sismepre:
        required: false
        glob_patterns:
        - data/landing/sismepre/rentas_*_diccionario.csv
      renamu:
        required: false
        paths:
        - data/landing/renamu/Diccionario.pdf
        - data/landing/renamu/extracted/783-Modulo1726/2.Diccionario de Datos - RENAMU 2022.pdf
      municipal_classification:
        required: false
        paths:
        - data/landing/municipal_classification/manifest.json
        notes:
        - La referencia semantica local proviene del manifest y de los PDFs/CSV regenerables de Landing.
    rules:
      dataset_path_exists:
        severity: FAIL
        description: Validar que exista la ruta esperada del recurso Silver.
      parquet_files_exist:
        severity: FAIL
        description: Validar que existan archivos Parquet bajo la ruta del recurso Silver.
      dataset_readable:
        severity: FAIL
        description: Validar que Spark pueda leer el dataset Silver.
      row_count_positive:
        severity: FAIL
        description: Validar que el recurso Silver tenga al menos una fila.
      column_count_positive:
        severity: FAIL
        description: Validar que el recurso Silver tenga al menos una columna.
      silver_metadata_columns_present:
        severity: FAIL
        description: Validar metadata técnica obligatoria de Silver.
      expected_typed_columns_present:
        severity: FAIL
        description: Validar columnas tipadas críticas esperadas por recurso.
      expected_flags_present:
        severity: FAIL
        description: Validar flags técnicos críticos esperados por recurso.
      critical_nulls:
        severity: WARNING
        description: Detectar nulos en columnas críticas de Silver.
      exact_duplicate_rows:
        severity: WARNING
        description: Detectar filas duplicadas exactas.
      candidate_key_duplicates:
        severity: WARNING
        description: Detectar duplicados por llaves candidatas preliminares.
      invalid_boolean_flags:
        severity: WARNING
        description: Detectar flags booleanos nulos o con valores no booleanos.
      dictionary_reference_missing:
        severity: WARNING
        description: Advertir si falta una referencia semántica local opcional.
    sources:
      siaf_income:
        expected_resources:
        - annual_2012
        - annual_2013
        - annual_2014
        - annual_2015
        - annual_2016
        - annual_2017
        - annual_2018
        - annual_2019
        - annual_2020
        - annual_2021
        - annual_2022
        - annual_2023
        - annual_2024
        - monthly_2025
        - daily_2025
        - monthly_2026
        - daily_2026
        metadata_columns:
        - silver_source_year
        - silver_source_granularity
        typed_columns:
        - anio
        - mes
        - monto_pia_decimal
        - monto_pim_decimal
        - monto_recaudado_decimal
        expected_flags:
        - is_valid_anio
        - is_valid_mes
        - is_valid_monto_pia
        - is_valid_monto_pim
        - is_valid_monto_recaudado
        critical_null_columns:
        - anio
        - mes
        - monto_pia_decimal
        - monto_pim_decimal
        - monto_recaudado_decimal
        amount_columns:
        - monto_pia_decimal
        - monto_pim_decimal
        - monto_recaudado_decimal
        candidate_key:
          description: Llave presupuestal preliminar; no bloquea integración futura.
          columns:
          - anio
          - mes
          - nivel_gobierno
          - sector
          - pliego
          - sec_ejec
          - ejecutora
          - fuente_financiamiento
          - rubro
          - tipo_recurso
          - generica
          - subgenerica
          - subgenerica_det
          - especifica
          - especifica_det
      sismepre:
        expected_resources:
          ano_aplicacion:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
          entidad_estado:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - sec_ejec
          esat_estadistica_atm:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            - ano_estadistica_int
            - mes_estadistica_int
            dynamic_typed_patterns:
            - mon_*_decimal
            - num_*_decimal
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - is_valid_mes_estadistica
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - sec_ejec
          estadistica:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            - ano_estadistica_int
            - mes_estadistica_int
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - is_valid_mes_estadistica
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - formulario_id
          formulario:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - formulario_id
          preguntas:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - formulario_id
            - pregunta_id
          respuestas:
            typed_columns:
            - ano_aplicacion_int
            - periodo_int
            - respuesta_decimal_value
            - respuesta_entero_value
            - respuesta_fecha_value
            expected_flags:
            - is_valid_ano_aplicacion
            - is_valid_periodo
            - is_valid_respuesta_decimal
            - is_valid_respuesta_entero
            - has_required_relationship_keys
            critical_null_columns:
            - ano_aplicacion_int
            - periodo_int
            candidate_key:
            - ano_aplicacion
            - periodo
            - formulario_id
            - pregunta_id
            - sec_ejec
        metadata_columns:
        - silver_source_role
        - silver_source_priority
      renamu:
        expected_resources:
          municipal_context:
            expected_row_count: 1874
            typed_columns:
            - anio
            - ubigeo6
            - tipomuni_codigo
            - tipomuni_nombre
            - total_computadoras_operativas
            - total_personal_dic_2021
            - total_personal_mar_2022
            expected_flags: []
            critical_null_columns:
            - anio
            - ubigeo6
            - idmunici
            - departamento_nombre
            - provincia_nombre
            - distrito_nombre
            duplicate_keys:
            - ubigeo6
            - idmunici
            valid_tipomuni_values:
            - '1'
            - '2'
            - '3'
        metadata_columns: []
      municipal_classification:
        expected_resources:
          municipal_classification:
            typed_columns:
            - anio
            - ubigeo6
            - tipo_clasificacion
            - ambito_municipal
            - descripcion_tipo
            - departamento_nombre
            - provincia_nombre
            - distrito_nombre
            expected_flags: []
            critical_null_columns:
            - anio
            - ubigeo6
            - tipo_clasificacion
            - ambito_municipal
            - departamento_nombre
            - provincia_nombre
            - distrito_nombre
            candidate_key:
            - anio
            - ubigeo6
            valid_tipo_clasificacion:
            - A
            - B
            - C
            - D
            - E
            - F
            - G
            notes:
            - La futura integracion de esta fuente debe realizarse por ubigeo6, no por nombre municipal.
        metadata_columns: []
  notes:
  - Estas reglas aplican a Bronze y son progresivas.
  - No exigen columnas de negocio todavía.
  - Las reglas dependientes de columnas se registran como WARNING no evaluado cuando la columna no existe.
  - Las reglas Silver, Gold, Hive y Power BI se definirán en fases posteriores.
