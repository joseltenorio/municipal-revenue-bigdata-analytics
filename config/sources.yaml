      - "La URL del catalogo puede presentar timeout desde Python, pero los recursos directos del INEI deben probarse por separado."
      - "La ingesta debe priorizar el ZIP completo y conservar el diccionario PDF como referencia documental."
      - "La extraccion del ZIP se realiza localmente en Landing y no debe versionarse en Git."
