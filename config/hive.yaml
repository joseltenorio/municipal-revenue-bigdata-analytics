hive:
  host: localhost
  port: 10000
  metastore_host: localhost
  metastore_port: 9083
  web_ui_port: 10002
  protocol: thrift
  server: HiveServer2

  docker:
    hive_server_container: municipal_revenue_hive_server
    hive_metastore_container: municipal_revenue_hive_metastore
    warehouse_path: /opt/hive/data/warehouse
    project_mount_path: /app

  databases:
    bronze: bronze
    silver: silver
    gold: gold

  external_tables:
    file_format: parquet
    table_type: external
    location_strategy: project_data_layers

  connection:
    preferred_client: ODBC
    powerbi_mode: Import
    direct_query_required: false

  validation_queries:
    - SELECT current_database()
    - SHOW DATABASES
    - SHOW TABLES

  notes:
    - Hive funcionará como catálogo SQL del lakehouse.
    - Las tablas externas apuntarán a archivos Parquet generados por Spark.
    - Power BI consumirá preferentemente tablas Gold desde HiveServer2 mediante ODBC.
    - En entorno Docker, HiveServer2 se expone en localhost:10000.
