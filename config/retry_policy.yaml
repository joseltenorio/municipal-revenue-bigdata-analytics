retry_policy:
  default:
    max_attempts: 3
    timeout_seconds: 60
    backoff_seconds: 5
    backoff_multiplier: 2
    retryable_http_status_codes:
      - 429
      - 500
      - 502
      - 503
      - 504
    retryable_errors:
      - TimeoutError
      - ConnectionError
      - HTTPError

  sources:
    siaf_income:
      max_attempts: 3
      timeout_seconds: 90
      backoff_seconds: 5
      backoff_multiplier: 2

    sismepre:
      max_attempts: 4
      timeout_seconds: 90
      backoff_seconds: 5
      backoff_multiplier: 2

    renamu:
      max_attempts: 3
      timeout_seconds: 120
      backoff_seconds: 10
      backoff_multiplier: 2

fallback:
  manual_download:
    enabled: true
    description: Se permite descarga manual controlada si una fuente pública no ofrece acceso estable por API o descarga directa.
    evidence_required: true
    audit_status: PARTIAL_SUCCESS
